services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD はローカル開発専用のデフォルト値（"postgres"）にフォールバックする。
      # 本番DB（Neon 等）にこの compose 設定は使わない前提。CI でも別途上書きすること。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

volumes:
  pg_data:
